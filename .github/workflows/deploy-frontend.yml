name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend

      - name: Build Project Artifacts
        run: vercel build --prod --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend

  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend

      - name: Build Project Artifacts
        run: vercel build --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token="vcp_8HsZR0bHRsKjK4i5GQpTX5cy4h61GWfG61DosPT4k2BRv5T0lN4cKPtV"
        working-directory: ./frontend
